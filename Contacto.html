 <div>   

    <form>
        <h1>Registro</h1>

        <label for="Nombre"</label>
        <input type="text" id="Nombre" placeholder="Nombre" name="Name" required> <br>

        <label for="Apellido"></label>
        <input type="text" id="Apellido" placeholder="Apellido" name="Name" required> <br>

        <label for="Telefono"></label>
        <input type="tel" id="Numero" maxlength="10" placeholder="Numero Tel" name="Name" required> <br>

        <label for="Correo"></label>
        <input type="email" id="email" placeholder="e-mail" name="Name" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" required> <br>

        <label class="checkbox" for="Terminos y Condiciones" >Terminos Y Condiciones</label>
        <input type="checkbox" id="checkbox" name="checkbox" required> <br>

        <input  type="submit" value="Enviar">


    </form>
